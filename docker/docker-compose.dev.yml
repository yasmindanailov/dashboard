# ═══════════════════════════════════════════════
# Aelium Dashboard — Development Services
# Solo PostgreSQL + Redis para desarrollo local
# Levantar con: docker compose -f docker/docker-compose.dev.yml up -d
# ═══════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: aelium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aelium_dashboard
      POSTGRES_USER: aelium
      POSTGRES_PASSWORD: aelium_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aelium -d aelium_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aelium-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ── MailPit (email local para desarrollo) ──
  # Web UI: http://localhost:8025  |  SMTP: localhost:1025
  mailpit:
    image: axllent/mailpit:latest
    container_name: aelium-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ── MinIO (storage S3-compatible local — Sprint 11.5 + ADR-043 + ADR-062) ──
  # API S3:    http://localhost:9000
  # Consola:   http://localhost:9001  (login: minioadmin / minioadmin)
  # El bucket lo crea automáticamente StorageService.ensureBucket() en boot.
  minio:
    image: minio/minio:latest
    container_name: aelium-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
