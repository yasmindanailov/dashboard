name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancela ejecuciones anteriores del mismo PR/branch cuando llega un commit nuevo.
# Ahorra minutos de CI y da feedback más rápido.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      - name: Build (bloqueante)
        run: pnpm build

      - name: Lint (informativo — no bloquea hasta sanear errores reales)
        run: pnpm lint:check
        continue-on-error: true

      - name: Tests (bloqueante)
        run: pnpm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      - name: Lint (informativo — no bloquea hasta sanear errores reales)
        run: pnpm lint:check
        continue-on-error: true

      - name: Build (bloqueante)
        run: pnpm build
        env:
          # Variables mínimas para que `next build` no falle.
          # Cuando haya backend desplegado, sustituir por la URL real (vía secrets).
          NEXT_PUBLIC_API_URL: http://localhost:3000
