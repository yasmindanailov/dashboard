name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancela ejecuciones anteriores del mismo PR/branch cuando llega un commit nuevo.
# Ahorra minutos de CI y da feedback más rápido.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Versión leída desde packageManager en package.json del root.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      - name: Build (bloqueante)
        run: pnpm build

      - name: Lint (bloqueante — saneado en P0.3.a, mantener en 0)
        run: pnpm lint:check

      - name: Tests (bloqueante)
        run: pnpm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      # Frontend: `lint` (sin --max-warnings) en lugar de `lint:check` porque
      # quedan 27 warnings `set-state-in-effect` (deuda DC.6 — migración a
      # Server Components + Suspense, ver `docs/60-roadmap/backlog.md`).
      # Los errores reales (lint:check) están en 0 desde P0.3.b.
      - name: Lint (bloqueante en errores; warnings DC.6 visibles)
        run: pnpm lint

      - name: Build (bloqueante)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — Tests end-to-end con Playwright
  #
  # Sprint 13.5.5 Fase A (DC.27): el job corre dentro de la imagen oficial
  # mcr.microsoft.com/playwright:v1.59.1-noble — Chromium + system libs ya
  # vienen pre-instalados, eliminando ~60-90s de install + flake de
  # `apt-get update`. Pin major.minor sincronizado con @playwright/test del
  # root package.json.
  #
  # Cuando el job corre en `container:`, los `services:` se conectan por DNS
  # del network interno (hostname = service name) sin port mapping. El
  # backend y frontend que Playwright arranca como `webServer` corren en el
  # MISMO container del job, por tanto `localhost:3001/3002` siguen siendo
  # correctos para `NEXT_PUBLIC_API_URL` / `E2E_*_URL`.
  #
  # Política de ejecución (Sprint 15C.II post-Fase D, 2026-05-10):
  #   - SIEMPRE en `push` a `master` (post-merge — última red de seguridad).
  #   - En `pull_request` solo cuando el PR tiene la label `ready-for-e2e`.
  #     Mientras estás iterando un PR, los 3 shards × ~10-25 min NO consumen
  #     minutos CI. Añade la label cuando el PR esté listo para merge.
  #   - Backend + Frontend (rápidos, ~3 min cada uno) siguen en CADA PR.
  #
  # Ahorro estimado: ~70% minutos CI mensuales vs ejecutar E2E en cada PR.
  # Documentación operativa: `docs/90-meta/local-ci-playbook.md` §Workflows remotos.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ready-for-e2e'))

    # Sprint 13.5.5 Fase B (DC.13 parcial-canónica): sharding CI con
    # Playwright `--shard=N/M`. Cada shard arranca sus propios services
    # efímeros (postgres / redis / mailpit / minio) y su propio
    # backend+frontend, evitando los race conditions identificados en los
    # 6 specs system-wide (tasks-crons, outbox-invoice, notifications,
    # audit-portal, admin-error-log, admin-tree-migration). Local sigue
    # con `workers: 1 + fullyParallel: false` (paralelización local
    # diferida — ver `current.md` Sprint 13.5.5 y `e2e-environment.md §4.2`).
    #
    # `fail-fast: false` para que un shard rojo no cancele los demás:
    # mejor diagnóstico end-to-end.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total: [3]

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      # No `options: --user` — la imagen ya viene con un usuario pwuser
      # apropiado, y forzar uid puede romper permisos sobre el workspace.

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aelium
          POSTGRES_PASSWORD: aelium_test
          POSTGRES_DB: aelium_dashboard_test
        # Cuando el job corre en container, los services se acceden por
        # hostname interno del network compartido — sin port mapping.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        # MailPit no expone healthcheck trivial; los specs verifican
        # disponibilidad al primer fetch. Si reincide flake, añadir
        # `--health-cmd "wget --spider -q http://localhost:8025/api/v1/info"`.

      # MinIO ahora SÍ como service container. Usamos la imagen Bitnami
      # porque arranca `minio server` automáticamente con
      # `MINIO_DEFAULT_BUCKETS` (autocrea bucket), evitando el workaround
      # `docker run` desde step del workflow legacy (Sprint 11.5 / ADR-062
      # §C) — la oficial `minio/minio` requiere `command: server /data`
      # como arg posicional, y GHA `services:` no permite sobrescribir
      # CMD (solo flags vía `options:`).
      #
      # Pin a `bitnamilegacy/minio:2025.7.23-debian-12-r5`: Bitnami
      # retiró `bitnami/minio:latest` del Docker Hub público en agosto
      # 2025 (https://github.com/bitnami/containers/issues/83267). El
      # repo `bitnamilegacy/*` mantiene tags fechados de la última
      # versión funcional con licencia Apache 2.0. Cuando este patrón
      # deje de mantenerse, evaluar alternativas (imagen custom en GHCR
      # con CMD precompilado, o seaweedfs) en sub-sprint dedicado.
      minio:
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: aelium-storage
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # Conexiones a los services — service names (DNS interno) en lugar de
      # localhost. Sprint 13.5.5 Fase A.
      DATABASE_URL: postgresql://aelium:aelium_test@postgres:5432/aelium_dashboard_test?schema=public
      # REDIS_URL es la canónica desde Sprint 9 Fase A (ADR-063 §B):
      # JobsModule + DlqService leen `ConfigService.getOrThrow('REDIS_URL')`.
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      # Prefijo BullMQ aislado para CI — evita colisiones si el runner
      # comparte Redis con otros jobs (improbable con services efímeros,
      # pero más seguro y barato).
      BULLMQ_PREFIX: aelium-jobs-ci

      # Backend (corre en el MISMO container del job — localhost ok)
      PORT: 3001
      API_PREFIX: api/v1
      JWT_SECRET: ci-test-jwt-access-secret-not-for-production-32chars
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-not-for-production-32chars
      # ENCRYPTION_KEY canónico para CI — exactamente 64 hex chars (32 bytes)
      # validados estrictamente por SecretVaultService (Sprint 15A — ADR-080 §3).
      # Valor sintético determinista: 4 × `0123456789abcdef` = 64 hex chars.
      # NUNCA usar este valor en producción — generar con `openssl rand -hex 32`.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MAIL_TRANSPORT: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: 'Aelium CI <noreply@aelium.test>'
      SUPERADMIN_EMAIL: admin@aelium.net
      SUPERADMIN_PASSWORD: AeliumDev2026
      DISABLE_CRON_WORKERS: 'true'

      # MinIO / S3 (Sprint 11.5 + ADR-062). Service container `minio`.
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: aelium-storage
      S3_REGION: eu-west-1
      S3_FORCE_PATH_STYLE: 'true'

      # Frontend (corre en el MISMO container del job — localhost ok)
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3002

      # E2E config — backend/frontend en localhost del container; mailpit
      # via service name.
      E2E_FRONTEND_URL: http://localhost:3002
      E2E_BACKEND_URL: http://localhost:3001
      E2E_API_URL: http://localhost:3001/api/v1
      E2E_MAILPIT_URL: http://mailpit:8025
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install root tooling (Playwright, etc.)
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # NOTA: Sprint 13.5.5 Fase A — eliminados los steps de cache + install
      # de Playwright browsers/system deps. La imagen oficial
      # mcr.microsoft.com/playwright:v1.59.1-noble ya los incluye, ahorrando
      # ~60-90s por run y eliminando flakes intermitentes de `apt-get update`.

      - name: Prisma — generate
        run: pnpm prisma generate
        working-directory: backend

      - name: Prisma — migrate (deploy)
        run: pnpm prisma migrate deploy
        working-directory: backend

      - name: Prisma — seed (roles, settings, superadmin)
        run: pnpm prisma db seed
        working-directory: backend

      - name: Build backend
        run: pnpm build
        working-directory: backend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Sufijo por shard — actions/upload-artifact@v4 falla si dos jobs
          # de la matrix suben artifacts con el mismo nombre.
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14
