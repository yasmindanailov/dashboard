name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancela ejecuciones anteriores del mismo PR/branch cuando llega un commit nuevo.
# Ahorra minutos de CI y da feedback más rápido.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Versión leída desde packageManager en package.json del root.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      - name: Build (bloqueante)
        run: pnpm build

      - name: Lint (informativo — no bloquea hasta sanear errores reales)
        run: pnpm lint:check
        continue-on-error: true

      - name: Tests (bloqueante)
        run: pnpm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      - name: Lint (informativo — no bloquea hasta sanear errores reales)
        run: pnpm lint:check
        continue-on-error: true

      - name: Build (bloqueante)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — Tests end-to-end con Playwright
  # Requiere Postgres, Redis y MailPit como service containers.
  # Arranca backend (3001) y frontend (3002) y los testea como un usuario real.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aelium
          POSTGRES_PASSWORD: aelium_test
          POSTGRES_DB: aelium_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

    env:
      # Conexiones a los services
      DATABASE_URL: postgresql://aelium:aelium_test@localhost:5432/aelium_dashboard_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''

      # Backend
      PORT: 3001
      API_PREFIX: api/v1
      JWT_SECRET: ci-test-jwt-access-secret-not-for-production-32chars
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-not-for-production-32chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd
      MAIL_TRANSPORT: smtp
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_FROM: 'Aelium CI <noreply@aelium.test>'
      SUPERADMIN_EMAIL: admin@aelium.net
      SUPERADMIN_PASSWORD: AeliumDev2026
      DISABLE_CRON_WORKERS: 'true'

      # Frontend
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3002

      # E2E config
      E2E_FRONTEND_URL: http://localhost:3002
      E2E_BACKEND_URL: http://localhost:3001
      E2E_API_URL: http://localhost:3001/api/v1
      E2E_MAILPIT_URL: http://localhost:8025
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install root tooling (Playwright, etc.)
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (always — kernel libs)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Prisma — generate
        run: pnpm prisma generate
        working-directory: backend

      - name: Prisma — migrate (deploy)
        run: pnpm prisma migrate deploy
        working-directory: backend

      - name: Prisma — seed (roles, settings, superadmin)
        run: pnpm prisma db seed
        working-directory: backend

      - name: Build backend
        run: pnpm build
        working-directory: backend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
