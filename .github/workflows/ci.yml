name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancela ejecuciones anteriores del mismo PR/branch cuando llega un commit nuevo.
# Ahorra minutos de CI y da feedback más rápido.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Versión leída desde packageManager en package.json del root.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      - name: Build (bloqueante)
        run: pnpm build

      - name: Lint (bloqueante — saneado en P0.3.a, mantener en 0)
        run: pnpm lint:check

      - name: Tests (bloqueante)
        run: pnpm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (bloqueante)
        run: pnpm typecheck

      # Frontend: `lint` (sin --max-warnings) en lugar de `lint:check` porque
      # quedan 27 warnings `set-state-in-effect` (deuda DC.6 — migración a
      # Server Components + Suspense, ver `docs/60-roadmap/backlog.md`).
      # Los errores reales (lint:check) están en 0 desde P0.3.b.
      - name: Lint (bloqueante en errores; warnings DC.6 visibles)
        run: pnpm lint

      - name: Build (bloqueante)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — Tests end-to-end con Playwright
  # Requiere Postgres, Redis y MailPit como service containers.
  # Arranca backend (3001) y frontend (3002) y los testea como un usuario real.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aelium
          POSTGRES_PASSWORD: aelium_test
          POSTGRES_DB: aelium_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

      # NOTA: MinIO no se declara aquí como `service:` porque GitHub
      # Actions services no soporta `command:` y la imagen oficial
      # `minio/minio` necesita el arg `server /data`. Se arranca como
      # step explícito más abajo ("Start MinIO"). Ver ADR-062 §C.

    env:
      # Conexiones a los services
      DATABASE_URL: postgresql://aelium:aelium_test@localhost:5432/aelium_dashboard_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''

      # Backend
      PORT: 3001
      API_PREFIX: api/v1
      JWT_SECRET: ci-test-jwt-access-secret-not-for-production-32chars
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-not-for-production-32chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd
      MAIL_TRANSPORT: smtp
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_FROM: 'Aelium CI <noreply@aelium.test>'
      SUPERADMIN_EMAIL: admin@aelium.net
      SUPERADMIN_PASSWORD: AeliumDev2026
      DISABLE_CRON_WORKERS: 'true'

      # MinIO / S3 (Sprint 11.5 + ADR-062). El bucket se autocrea con
      # `MINIO_DEFAULT_BUCKETS` (bitnami/minio); StorageService.ensureBucket()
      # actúa como red de seguridad en boot.
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: aelium-storage
      S3_REGION: eu-west-1
      S3_FORCE_PATH_STYLE: 'true'

      # Frontend
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3002

      # E2E config
      E2E_FRONTEND_URL: http://localhost:3002
      E2E_BACKEND_URL: http://localhost:3001
      E2E_API_URL: http://localhost:3001/api/v1
      E2E_MAILPIT_URL: http://localhost:8025
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MinIO como step (no como service:) porque GitHub Actions services
      # no acepta `command:` y la imagen oficial `minio/minio` necesita
      # `server /data` como arg. Mismo puerto y credenciales que en local.
      - name: Start MinIO
        run: |
          docker run -d \
            --name aelium-minio-ci \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"

      - name: Wait for MinIO ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO listo en intento $i"
              exit 0
            fi
            sleep 2
          done
          echo "MinIO no respondió tras 60s — abortando"
          docker logs aelium-minio-ci || true
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install root tooling (Playwright, etc.)
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (always — kernel libs)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Prisma — generate
        run: pnpm prisma generate
        working-directory: backend

      - name: Prisma — migrate (deploy)
        run: pnpm prisma migrate deploy
        working-directory: backend

      - name: Prisma — seed (roles, settings, superadmin)
        run: pnpm prisma db seed
        working-directory: backend

      - name: Build backend
        run: pnpm build
        working-directory: backend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
