<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Aelium">
  <!-- Isotipo de Aelium (F1d): dos cuadrados redondeados rotados 45°, mismo
       trazado que el componente BrandMark, centrado en el lienzo 32×32.
       Rombo claro detrás-izquierda (#BFDBFE) + rombo de marca delante (#3B82F6). -->
  <g transform="translate(16 16) scale(0.8226) translate(-13.5 -14.5)">
    <rect x="0" y="6" width="17" height="17" rx="5" transform="rotate(45 8.5 14.5)" fill="#BFDBFE"/>
    <rect x="10" y="6" width="17" height="17" rx="5" transform="rotate(45 18.5 14.5)" fill="#3B82F6"/>
  </g>
</svg>
