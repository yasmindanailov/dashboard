<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { margin:0; }
  @keyframes hdrFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(4deg); } }
  @keyframes hdrRipple { 0% { opacity:.55; transform: translate(-50%,-50%) rotate(45deg) scale(.2); } 100% { opacity:0; transform: translate(-50%,-50%) rotate(45deg) scale(3); } }
</style>
</helmet>

<div ref="{{ rootRef }}" style="position:relative;width:1440px;height:460px;overflow:hidden;background:linear-gradient(135deg,#1D4ED8 0%,#2563EB 52%,#3B82F6 100%);font-family:'DM Sans',sans-serif;--mx:0;--my:0;--gx:50%;--gy:50%;cursor:crosshair">

  <!-- cursor glow -->
  <div style="position:absolute;left:var(--gx);top:var(--gy);width:560px;height:560px;margin-left:-280px;margin-top:-280px;border-radius:9999px;background:radial-gradient(circle,rgba(147,197,253,0.32),rgba(147,197,253,0) 68%);pointer-events:none;filter:blur(4px)"></div>

  <!-- diamond field -->
  <sc-for list="{{ diamonds }}" as="d" hint-placeholder-count="22">
    <div style="{{ d.outerStyle }}"><div style="{{ d.midStyle }}"><div style="{{ d.shapeStyle }}"></div></div></div>
  </sc-for>

  <!-- content -->
  <div style="position:absolute;left:80px;top:0;height:100%;display:flex;align-items:center;pointer-events:none">
    <div style="perspective:900px">
      <div style="display:flex;align-items:center;gap:30px;transform:rotateY(calc(var(--mx) * 9deg)) rotateX(calc(var(--my) * -9deg)) translate(calc(var(--mx) * 10px), calc(var(--my) * 8px));transform-style:preserve-3d">
        <div style="position:relative;width:104px;height:104px;flex-shrink:0">
          <div style="position:absolute;left:0;top:21px;width:62px;height:62px;transform:translate(calc(var(--mx) * -12px),0)"><div style="width:100%;height:100%;border-radius:17px;background:rgba(191,219,254,0.92);transform:rotate(45deg)"></div></div>
          <div style="position:absolute;left:38px;top:21px;width:62px;height:62px;transform:translate(calc(var(--mx) * 12px),0)"><div style="width:100%;height:100%;border-radius:17px;background:#ffffff;transform:rotate(45deg)"></div></div>
        </div>
        <sc-if value="{{ showWordmark }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;flex-direction:column;line-height:1">
          <span style="font-size:64px;font-weight:600;letter-spacing:-0.02em;color:#ffffff">aelium</span>
          <span style="font-size:15px;font-weight:500;letter-spacing:0.02em;color:rgba(255,255,255,0.72);margin-top:12px">Tu socio digital, a tu lado.</span>
        </div>
        </sc-if>
      </div>
    </div>
  </div>

  <div style="position:absolute;right:30px;bottom:22px;font-family:'DM Mono',monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.5);pointer-events:none">Mueve el cursor · haz clic</div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 460 },
  &quot;intensity&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.3, &quot;max&quot;: 2, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot; },
  &quot;density&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;normal&quot;, &quot;options&quot;: [&quot;few&quot;, &quot;normal&quot;, &quot;many&quot;], &quot;tsType&quot;: &quot;string&quot; },
  &quot;showWordmark&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.rootRef = React.createRef();
  }

  _rng(seed) {
    let t = seed >>> 0;
    return () => {
      t += 0x6D2B79F5;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }

  _build(count) {
    const rnd = this._rng(1337);
    const pal = ['rgba(255,255,255,0.10)', 'rgba(255,255,255,0.16)', 'rgba(191,219,254,0.24)', 'rgba(147,197,253,0.20)', 'rgba(255,255,255,0.07)'];
    const out = [];
    for (let i = 0; i < count; i++) {
      const size = Math.round(16 + rnd() * 74);
      const x = +(rnd() * 100).toFixed(2);
      const y = +(rnd() * 100).toFixed(2);
      const dx = Math.round(6 + size * 0.5);
      const dy = Math.round((6 + size * 0.5) * 0.55);
      const dur = (5 + rnd() * 5).toFixed(2);
      const del = (-rnd() * 6).toFixed(2);
      const outline = rnd() < 0.34;
      const col = pal[Math.floor(rnd() * pal.length)];
      const rad = Math.max(4, Math.round(size * 0.26));
      const outerStyle = `position:absolute;left:${x}%;top:${y}%;width:${size}px;height:${size}px;margin-left:${-size / 2}px;margin-top:${-size / 2}px;transform:translate(calc(var(--mx) * ${dx}px), calc(var(--my) * ${dy}px));will-change:transform`;
      const midStyle = `width:100%;height:100%;animation:hdrFloat ${dur}s ease-in-out ${del}s infinite`;
      const shapeStyle = outline
        ? `width:100%;height:100%;border-radius:${rad}px;border:1.5px solid ${col};transform:rotate(45deg)`
        : `width:100%;height:100%;border-radius:${rad}px;background:${col};transform:rotate(45deg)`;
      out.push({ i, outerStyle, midStyle, shapeStyle });
    }
    return out;
  }

  _ripple(root, x, y) {
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${x}px;top:${y}px;width:96px;height:96px;border-radius:26px;border:2px solid rgba(255,255,255,0.5);transform:translate(-50%,-50%) rotate(45deg) scale(.2);pointer-events:none;animation:hdrRipple .9s ease-out forwards;z-index:5`;
    root.appendChild(el);
    setTimeout(() => el.remove(), 920);
  }

  componentDidMount() {
    const root = this.rootRef.current;
    if (!root) return;
    this._t = { mx: 0, my: 0 };
    this._c = { mx: 0, my: 0 };
    this._onMove = (e) => {
      const r = root.getBoundingClientRect();
      this._t.mx = ((e.clientX - r.left) / r.width - 0.5) * 2;
      this._t.my = ((e.clientY - r.top) / r.height - 0.5) * 2;
      root.style.setProperty('--gx', (e.clientX - r.left) + 'px');
      root.style.setProperty('--gy', (e.clientY - r.top) + 'px');
    };
    this._onLeave = () => { this._t.mx = 0; this._t.my = 0; };
    this._onDown = (e) => { const r = root.getBoundingClientRect(); this._ripple(root, e.clientX - r.left, e.clientY - r.top); };
    root.addEventListener('pointermove', this._onMove);
    root.addEventListener('pointerleave', this._onLeave);
    root.addEventListener('pointerdown', this._onDown);
    const loop = () => {
      const k = this._intensity || 1;
      this._c.mx += (this._t.mx * k - this._c.mx) * 0.08;
      this._c.my += (this._t.my * k - this._c.my) * 0.08;
      root.style.setProperty('--mx', this._c.mx.toFixed(4));
      root.style.setProperty('--my', this._c.my.toFixed(4));
      this._raf = requestAnimationFrame(loop);
    };
    loop();
  }

  componentWillUnmount() {
    cancelAnimationFrame(this._raf);
    const root = this.rootRef.current;
    if (root) {
      root.removeEventListener('pointermove', this._onMove);
      root.removeEventListener('pointerleave', this._onLeave);
      root.removeEventListener('pointerdown', this._onDown);
    }
  }

  renderVals() {
    const density = this.props.density ?? 'normal';
    const count = density === 'few' ? 16 : density === 'many' ? 42 : 26;
    if (this._count !== count) { this._count = count; this._diamonds = this._build(count); }
    this._intensity = this.props.intensity ?? 1;
    return {
      diamonds: this._diamonds,
      rootRef: this.rootRef,
      showWordmark: this.props.showWordmark ?? true,
    };
  }
}
</script>
</body>
</html>
