<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  svg { fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.10); border-radius: 9999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,0.20); }
  @keyframes aelShimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  @keyframes aelLogoL { 0% { opacity: 0; transform: translateX(-22px); } 100% { opacity: 1; transform: translateX(0); } }
  @keyframes aelLogoR { 0% { opacity: 0; transform: translateX(22px); } 100% { opacity: 1; transform: translateX(0); } }
</style>
</helmet>

<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false"><defs>
  <symbol id="ic-dashboard" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></symbol>
  <symbol id="ic-store" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></symbol>
  <symbol id="ic-services" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></symbol>
  <symbol id="ic-domains" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></symbol>
  <symbol id="ic-billing" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2.5"></rect><line x1="1" y1="10" x2="23" y2="10"></line></symbol>
  <symbol id="ic-support" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></symbol>
  <symbol id="ic-supportInside" viewBox="0 0 24 24"><path d="M12 2l9 4v6c0 5-3.6 9.3-9 10-5.4-.7-9-5-9-10V6l9-4z"></path><path d="M12 11v4"></path><path d="M12 8h.01"></path></symbol>
</defs></svg>

<div style="min-height:100vh;background:#F7F7F8;font-family:'DM Sans',ui-sans-serif,system-ui,-apple-system,sans-serif;color:#0F172A;-webkit-font-smoothing:antialiased">

  <aside style="{{ sidebarStyleStr }}">
    <div style="height:64px;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid #E2E8F0;flex-shrink:0">
      <div style="position:relative;width:30px;height:30px;flex-shrink:0">
        <div style="position:absolute;left:0;top:6px;width:18px;height:18px;animation:aelLogoL .85s cubic-bezier(.34,1.2,.5,1) both"><div style="width:100%;height:100%;border-radius:5px;background:#BFDBFE;transform:rotate(45deg)"></div></div>
        <div style="position:absolute;left:11px;top:6px;width:18px;height:18px;animation:aelLogoR .85s cubic-bezier(.34,1.2,.5,1) .07s both"><div style="width:100%;height:100%;border-radius:5px;background:#3B82F6;transform:rotate(45deg)"></div></div>
      </div>
      <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;flex-direction:column;line-height:1.1;overflow:hidden">
          <span style="font-size:18px;font-weight:600;letter-spacing:-0.02em;color:#0F172A">aelium</span>
          <span style="font-size:10px;font-weight:500;letter-spacing:0.04em;color:#94A3B8;white-space:nowrap;margin-top:2px">Portal de cliente</span>
        </div>
      </sc-if>
    </div>

    <nav style="flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;overflow-x:hidden">
      <sc-for list="{{ items }}" as="item" hint-placeholder-count="7">
        <button type="button" onClick="{{ item.go }}" title="{{ item.titleAttr }}" style="{{ item.style }}" style-hover="{{ item.hover }}">
          <sc-if value="{{ item.showLeft }}" hint-placeholder-val="{{ false }}">
            <span style="{{ item.leftStyle }}"></span>
          </sc-if>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="color:{{ item.iconColor }};flex-shrink:0"><use href="#ic-{{ item.icon }}"></use></svg>
          <sc-if value="{{ item.showLabel }}" hint-placeholder-val="{{ true }}">
            <span style="flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ item.label }}</span>
          </sc-if>
          <sc-if value="{{ item.showRight }}" hint-placeholder-val="{{ false }}">
            <span style="width:7px;height:7px;border-radius:2px;transform:rotate(45deg);flex-shrink:0;background:#3B82F6"></span>
          </sc-if>
          <sc-if value="{{ item.showCount }}" hint-placeholder-val="{{ false }}">
            <span style="min-width:20px;height:20px;padding:0 6px;border-radius:9999px;background:#EFF4FF;color:#3B82F6;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0">{{ item.count }}</span>
          </sc-if>
        </button>
      </sc-for>
    </nav>

    <sc-if value="{{ showSupportCard }}" hint-placeholder-val="{{ false }}">
      <div style="margin:0 12px 8px;padding:12px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:14px;box-shadow:0 1px 2px rgba(15,23,42,0.04)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:11px">
          <div style="position:relative;flex-shrink:0">
            <div style="width:36px;height:36px;border-radius:9999px;background:#3B82F6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">LF</div>
            <span style="position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:9999px;background:#10B981;border:2px solid #fff"></span>
          </div>
          <div style="line-height:1.25;min-width:0;flex:1">
            <div style="font-size:13px;font-weight:600;color:#0F172A">Luis Ferrer</div>
            <div style="font-size:11px;color:#64748B">Tu técnico · responde en min.</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
          <span style="font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#94A3B8">Tus conversaciones</span>
          <sc-if value="{{ hasOpenConv }}" hint-placeholder-val="{{ false }}"><span style="font-size:10px;font-weight:600;color:#2A66C9;background:#EFF4FF;border-radius:9999px;padding:1px 7px">{{ openConvCount }} abierta</span></sc-if>
        </div>
        <div style="max-height:190px;overflow-y:auto;overflow-x:hidden;margin:0 -4px;padding:0 4px;display:flex;flex-direction:column;gap:2px">
          <sc-for list="{{ convRows }}" as="c" hint-placeholder-count="3">
            <button type="button" onClick="{{ c.go }}" style="display:flex;align-items:flex-start;gap:9px;width:100%;padding:8px 7px;border:none;background:transparent;border-radius:9px;cursor:pointer;font-family:inherit;text-align:left" style-hover="background:#F4F7FB">
              <span style="width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:{{ c.iconBg }};color:{{ c.iconColor }}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="{{ c.chatDisplay }}"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="{{ c.waDisplay }}"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.4 8.5 8.5 0 0 1-3.9-.9L3 20l1.1-3.1A8.38 8.38 0 0 1 3.5 11.5a8.5 8.5 0 0 1 17 0z"></path></svg>
              </span>
              <span style="flex:1;min-width:0;line-height:1.3">
                <span style="display:flex;align-items:center;justify-content:space-between;gap:6px">
                  <span style="font-size:12.5px;font-weight:600;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ c.title }}</span>
                  <span style="font-size:10px;color:#A8B2C0;white-space:nowrap;flex-shrink:0">{{ c.time }}</span>
                </span>
                <span style="display:flex;align-items:center;gap:5px;margin-top:2px">
                  <span style="width:6px;height:6px;border-radius:9999px;background:{{ c.statusDot }};flex-shrink:0"></span>
                  <span style="font-size:11px;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ c.preview }}</span>
                </span>
              </span>
              <sc-if value="{{ c.unread }}" hint-placeholder-val="{{ false }}"><span style="width:7px;height:7px;border-radius:9999px;background:#3B82F6;margin-top:4px;flex-shrink:0"></span></sc-if>
            </button>
          </sc-for>
        </div>
        <button type="button" onClick="{{ openChat }}" style="margin-top:9px;width:100%;padding:9px;border-radius:9999px;border:none;background:#3B82F6;color:#fff;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s ease" style-hover="background:#2563EB"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>Escribir a Luis</button>
      </div>
    </sc-if>

    <sc-if value="{{ showSupportMini }}" hint-placeholder-val="{{ false }}">
      <div style="padding:0 12px 10px;display:flex;justify-content:center">
        <button type="button" onClick="{{ openChat }}" title="Escribir a Luis, tu técnico" style="position:relative;width:46px;height:46px;border-radius:9999px;border:none;background:#3B82F6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(59,130,246,0.28);transition:background .15s ease" style-hover="background:#2563EB">LF<sc-if value="{{ hasOpenConv }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;padding:0 4px;border-radius:9999px;background:#EF4444;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #F8FAFF">{{ openConvCount }}</span></sc-if><span style="position:absolute;right:1px;bottom:1px;width:12px;height:12px;border-radius:9999px;background:#10B981;border:2px solid #F8FAFF"></span></button>
      </div>
    </sc-if>

  </aside>

  <header style="{{ topbarStyleStr }}">
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <sc-for list="{{ crumbs }}" as="crumb" hint-placeholder-count="1">
        <sc-if value="{{ crumb.showSep }}" hint-placeholder-val="{{ false }}">
          <svg width="16" height="16" viewBox="0 0 24 24" style="flex-shrink:0;color:#CBD5E1"><path d="M9 18l6-6-6-6"></path></svg>
        </sc-if>
        <button type="button" onClick="{{ crumb.go }}" style="{{ crumb.style }}" style-hover="{{ crumb.hover }}">{{ crumb.label }}</button>
      </sc-for>
    </div>

    <div style="display:flex;align-items:center;gap:8px">
      <button type="button" onClick="{{ toggleNotif }}" title="Notificaciones" style="position:relative;display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;border:none;background:transparent;color:#94A3B8;cursor:pointer" style-hover="background:#F1F5F9;color:#64748B">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <sc-if value="{{ notifHasUnread }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;top:3px;right:3px;min-width:15px;height:15px;padding:0 3px;border-radius:9999px;background:#EF4444;color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff">{{ notifUnread }}</span></sc-if>
      </button>

      <div style="width:1px;height:24px;background:#E2E8F0;margin:0 4px"></div>

      <button type="button" onClick="{{ toggleProfile }}" style="display:flex;align-items:center;gap:10px;padding:5px 8px 5px 12px;border-radius:12px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;font-family:inherit" style-hover="background:#FAFAFB">
        <div style="text-align:right;line-height:1.2">
          <div style="font-size:13px;font-weight:500;color:#0F172A">Sara Gómez</div>
          <div style="font-size:11px;color:#94A3B8">Cliente</div>
        </div>
        <div style="width:34px;height:34px;border-radius:9999px;background:#3B82F6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0">SG</div>
        <svg width="15" height="15" viewBox="0 0 24 24" style="color:#94A3B8"><path d="M6 9l6 6 6-6"></path></svg>
      </button>
    </div>
  </header>

  <main style="{{ mainStyleStr }}">
    <div style="padding:32px 36px;max-width:1320px;margin:0 auto">
      <sc-if value="{{ isOverview }}" hint-placeholder-val="{{ true }}">
        <dc-import name="Inicio" first-day="{{ isFirstDayProp }}" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isServices }}" hint-placeholder-val="{{ false }}">
        <dc-import name="MisServicios" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isServiceDetail }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ServicioDetalle" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isDomainDetail }}" hint-placeholder-val="{{ false }}">
        <dc-import name="DominioDetalle" navigate="{{ navigate }}" open-chat="{{ openChat }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isDomainTransfer }}" hint-placeholder-val="{{ false }}">
        <dc-import name="TransferenciaDominio" navigate="{{ navigate }}" open-chat="{{ openChat }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isDns }}" hint-placeholder-val="{{ false }}">
        <dc-import name="GestionDNS" navigate="{{ navigate }}" open-chat="{{ openChat }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isStore }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Tienda" cart-count="{{ cartCount }}" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isDomainSearch }}" hint-placeholder-val="{{ false }}">
        <dc-import name="BuscadorDominios" navigate="{{ navigate }}" open-chat="{{ openChat }}" cart="{{ cart }}" cart-count="{{ cartCount }}" add-to-cart="{{ addToCart }}" remove-from-cart="{{ removeFromCart }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isStoreProduct }}" hint-placeholder-val="{{ false }}">
        <dc-import name="TiendaConfigurar" has-support-inside="{{ tieneSI }}" navigate="{{ navigate }}" add-to-cart="{{ addToCart }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isCart }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Carrito" has-support-inside="{{ tieneSI }}" navigate="{{ navigate }}" cart="{{ cart }}" remove-from-cart="{{ removeFromCart }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isCheckout }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Facturacion" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isConfirm }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Confirmar" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isBilling }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Facturas" navigate="{{ navigate }}" estado-cobro="{{ billingScenario }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isInvoiceDetail }}" hint-placeholder-val="{{ false }}">
        <dc-import name="FacturaDetalle" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isSupport }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Soporte" navigate="{{ navigate }}" open-chat="{{ openChat }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isSupportInside }}" hint-placeholder-val="{{ false }}">
        <dc-import name="SupportInside" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isProfile }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Perfil" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isTransparency }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Transparencia" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>
      <sc-if value="{{ isNotifications }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Notificaciones" navigate="{{ navigate }}" hint-size="100%,100%"></dc-import>
      </sc-if>

      <sc-if value="{{ isOtherPage }}" hint-placeholder-val="{{ false }}">
      <div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;letter-spacing:0.04em;color:#B6BBC4;margin-bottom:26px">aelium&nbsp;&nbsp;/&nbsp;&nbsp;{{ routeLabel }}</div>
      <div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:8px;width:300px;height:30px;margin-bottom:12px"></div>
      <div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:8px;width:210px;height:14px;margin-bottom:32px"></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px">
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(15,23,42,0.04)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px"><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:6px;width:84px;height:12px"></div><span style="font-family:ui-monospace,monospace;font-size:9px;letter-spacing:0.08em;color:#CBD0D8;text-transform:uppercase">StatsCard</span></div><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:8px;width:120px;height:28px;margin-bottom:14px"></div><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:6px;width:64px;height:11px"></div></div>
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(15,23,42,0.04)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px"><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:6px;width:84px;height:12px"></div><span style="font-family:ui-monospace,monospace;font-size:9px;letter-spacing:0.08em;color:#CBD0D8;text-transform:uppercase">StatsCard</span></div><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:8px;width:120px;height:28px;margin-bottom:14px"></div><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:6px;width:64px;height:11px"></div></div>
        <div style="background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(15,23,42,0.04)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px"><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:6px;width:84px;height:12px"></div><span style="font-family:ui-monospace,monospace;font-size:9px;letter-spacing:0.08em;color:#CBD0D8;text-transform:uppercase">StatsCard</span></div><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:8px;width:120px;height:28px;margin-bottom:14px"></div><div style="background:linear-gradient(90deg,#EAEDF1 25%,#F4F5F7 37%,#EAEDF1 63%);background-size:800px 100%;animation:aelShimmer 1.5s ease-in-out infinite;border-radius:6px;width:64px;height:11px"></div></div>

class Component extends DCLogic {

  // ── Carrito compartido (única fuente de verdad para tienda, buscador y carrito) ──
  cartSeed() {
    const wp = { uid: 'wp', kind: 'hosting', name: 'Web Pro', sub: 'Hosting · facturación anual', icon: 'services', price: 115.20, renew: 115.20, term: 'al año', renewNote: 'Se renueva a 115,20 €/año el 14 jun 2027' };

    const n = this.props.cartItems != null ? this.props.cartItems : 2;
    return [wp, dom].slice(0, Math.max(0, Math.min(n, 2)));
  }
  cartList() { return this.state.cart !== null ? this.state.cart : this.cartSeed(); }
  addToCart(item) { this.setState((s) => { const cur = s.cart !== null ? s.cart : this.cartSeed(); if (cur.some((i) => i.uid === item.uid)) return {}; return { cart: [...cur, item] }; }); }

  // ── Conversaciones del cliente (fuente de verdad compartida con ChatWidget) ──
  convSeed() {
    if (!this._conv) this._conv = [
      { id: 's0', channel: 'chat', title: 'Migración de tu web', status: 'open', time: 'hace 6 min', unread: true,
        msgs: [

      { id: 's1', channel: 'chat', title: 'Velocidad de la web', status: 'resolved', time: 'hace 1 h',
        msgs: [
          { kind: 'system', body: 'Ayer' },
          { kind: 'client', body: 'Hola Luis, la web va lenta por las tardes.', meta: '17:58' },

          { kind: 'client', body: '¡Gracias Luis!', meta: '16:49' },

    ];
    return this._conv;

  renderVals() {
    const selector = this.props.navSelector || 'Tarjeta';
    const density = this.props.density || 'Cómoda';
    const showSupportCard = this.props.soporteCard !== false;
    const isFirstDay = (this.props.clientState || 'Establecido') === 'Primer día';
    const collapsed = this.state.collapsed;
    const expanded = !collapsed;
    const padY = density === 'Compacta' ? '8px' : '10px';

    const clientItems = [
      ['dashboard', 'Inicio', 'dashboard', 0],
      ['store', 'Tienda', 'store', 0],
      ['services', 'Mis servicios', 'services', 0],
      ['billing', 'Mis facturas', 'billing', 1],
      ['support', 'Soporte', 'support', 0],
      ['supportInside', 'Support Inside', 'supportInside', 0],
    ];
    const allIds = clientItems.map((i) => i[0]);
    const active = [...allIds, 'transparency', 'profile', 'notifications', 'service-detail', 'domain-detail', 'domain-transfer', 'invoice-detail', 'dns', 'store-product', 'domain-search', 'cart', 'checkout', 'confirm'].includes(this.state.active) ? this.state.active : allIds[0];

    const mk = (it) => {
      const [id, label, icon, count] = it;
      const isA = id === active;
      const layout = 'display:flex;align-items:center;' + (expanded ? 'gap:12px;justify-content:flex-start;padding:' + padY + ' 12px;' : 'gap:0;justify-content:center;padding:' + padY + ' 0;') + 'border-radius:10px;font-size:13px;font-family:inherit;text-align:left;cursor:pointer;white-space:nowrap;border:none;width:100%;box-sizing:border-box;transition:background .15s ease,color .15s ease,box-shadow .15s ease;';
      let skin, hover;
      if (selector === 'Tarjeta') {
        if (isA) { skin = 'color:#0F172A;font-weight:600;background:#FFFFFF;box-shadow:0 1px 3px rgba(15,23,42,0.08),0 0 0 1px rgba(59,130,246,0.12);'; hover = 'background:#FFFFFF;color:#0F172A;'; }
        else { skin = 'color:#64748B;font-weight:500;background:transparent;'; hover = 'background:#FFFFFF;color:#0F172A;box-shadow:0 1px 2px rgba(15,23,42,0.05);'; }
      } else if (selector === 'Rombo') {
        if (isA) { skin = 'color:#1D4ED8;font-weight:600;background:transparent;'; hover = 'background:#FFFFFF;color:#1D4ED8;'; }
        else { skin = 'color:#64748B;font-weight:500;background:transparent;'; hover = 'background:#FFFFFF;color:#0F172A;'; }
      } else {
        if (isA) { skin = 'color:#1D4ED8;font-weight:600;background:#EEF4FF;'; hover = 'background:#EEF4FF;color:#1D4ED8;'; }
        else { skin = 'color:#64748B;font-weight:500;background:transparent;'; hover = 'background:#FFFFFF;color:#0F172A;'; }
      }
      const showLeft = expanded && selector === 'Rombo';
      const showRight = expanded && selector === 'Tarjeta' && isA;
      const showCount = expanded && count > 0 && !showRight;
      return {
        id, label, icon,
        count: String(count),
        showCount, showLeft, showRight,
        showLabel: expanded,
        iconColor: isA ? '#3B82F6' : '#94A3B8',
        leftStyle: 'width:7px;height:7px;border-radius:2px;transform:rotate(45deg);flex-shrink:0;background:' + (isA ? '#3B82F6' : '#CBD5E1') + ';',
        style: layout + skin,
        hover,
        titleAttr: collapsed ? label : '',
        go: () => this.setState({ active: id }),
      };
    };

    const items = clientItems.map(mk);
    const activeItem = clientItems.find((i) => i[0] === active);
    const routeLabel = activeItem ? activeItem[1] : (active === 'transparency' ? 'Transparencia' : active === 'profile' ? 'Mi perfil' : active === 'notifications' ? 'Notificaciones' : active === 'service-detail' ? 'sara-estudio.com' : active === 'domain-detail' ? 'sara-estudio.com' : active === 'store-product' ? 'Web Pro' : active === 'domain-search' ? 'Buscar dominio' : active === 'cart' ? 'Carrito' : active === 'checkout' ? 'Facturación' : active === 'confirm' ? 'Confirmar' : active === 'invoice-detail' ? 'AEL-2026-00412' : active === 'dns' ? 'DNS · sara-estudio.com' : active === 'domain-transfer' ? 'estudio-marfil.com' : 'Inicio');
    const sidebarWidth = collapsed ? '72px' : '260px';

    const crumbCurrent = 'font-size:17px;font-weight:600;color:#0F172A;background:none;border:none;padding:0;font-family:inherit;cursor:default;letter-spacing:-0.01em';
    const crumbLink = 'font-size:17px;font-weight:500;color:#94A3B8;background:none;border:none;padding:0;font-family:inherit;cursor:pointer;letter-spacing:-0.01em';
    const crumbs = [];
    if (active === 'dashboard') {
      crumbs.push({ label: 'Inicio', showSep: false, style: crumbCurrent, hover: 'color:#0F172A', go: () => {} });
    } else {
      const roots = { 'service-detail': ['Mis servicios', 'services'], 'domain-detail': ['Mis servicios', 'services'], 'domain-transfer': ['Mis servicios', 'services'], 'invoice-detail': ['Mis facturas', 'billing'], 'dns': ['Mis servicios', 'services'], 'store-product': ['Tienda', 'store'], 'domain-search': ['Tienda', 'store'], 'cart': ['Tienda', 'store'], 'checkout': ['Tienda', 'store'], 'confirm': ['Tienda', 'store'] };
      const r = roots[active] || ['Inicio', 'dashboard'];
      crumbs.push({ label: r[0], showSep: false, style: crumbLink, hover: 'color:#64748B', go: () => this.setState({ active: r[1] }) });
      crumbs.push({ label: routeLabel, showSep: true, style: crumbCurrent, hover: 'color:#0F172A', go: () => {} });
    }

    const routeAlias = { invoices: 'billing' };
    const navigate = (id) => this.setState({ active: routeAlias[id] || id });
    const openChat = (kind) => this.setState({ chatOpen: true, chatChannel: typeof kind === 'string' ? kind : 'chat', chatSessionId: null, profileOpen: false, notifOpen: false });
    const openChatSession = (id) => this.setState({ chatOpen: true, chatSessionId: id, profileOpen: false, notifOpen: false });

    const chConv = { chat: { iconBg: '#EFF4FF', iconColor: '#3B82F6', wa: false }, whatsapp: { iconBg: '#E7F6EC', iconColor: '#16A34A', wa: true }, call: { iconBg: '#EFF4FF', iconColor: '#3B82F6', wa: false } };
    const stConv = { open: { label: 'Abierta', color: '#2A66C9', dot: '#3B82F6' }, resolved: { label: 'Resuelta', color: '#0E8C5F', dot: '#1AAE6F' } };
    const convData = this.convSeed();
    const convRows = convData.filter((c) => c.status === 'open').map((c) => {
      const ch = chConv[c.channel] || chConv.chat;
      const st = stConv[c.status] || stConv.open;
      const last = c.msgs[c.msgs.length - 1];
      const preview = last ? (last.kind === 'system' ? last.body : (last.kind === 'client' ? 'Tú: ' : 'Luis: ') + last.body) : '';
      return { title: c.title, time: c.time, preview, unread: !!c.unread, iconBg: ch.iconBg, iconColor: ch.iconColor, chatDisplay: ch.wa ? 'display:none' : '', waDisplay: ch.wa ? '' : 'display:none', statusDot: st.dot, statusLabel: st.label, statusColor: st.color, go: () => openChatSession(c.id) };
    });
    const openConvCount = convData.filter((c) => c.status === 'open').length;

    const NTONE = { info: { bg: '#EFF4FF', fg: '#3B82F6' }, success: { bg: '#E8F7F1', fg: '#0E8C5F' }, warning: { bg: '#FCF3E1', fg: '#B27A12' }, security: { bg: '#F1ECFB', fg: '#7C5CCB' } };
    const notifAll = this.notifList();
    const notifUnread = notifAll.filter((n) => !n.read).length;
    const notifRows = notifAll.slice(0, 5).map((n, i) => {
      const t = NTONE[n.tone] || NTONE.info;
      return {
        title: n.title, time: n.time, unread: !n.read,
        titleColor: n.read ? '#475569' : '#0F172A',
        titleWeight: n.read ? 500 : 600,
        icon: n.icon,
        iconStyle: 'width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:' + t.bg + ';color:' + t.fg,
        rowStyle: 'display:flex;align-items:flex-start;gap:12px;width:100%;padding:12px 16px;border:none;background:' + (n.read ? '#fff' : '#FBFCFF') + ';font-family:inherit;cursor:pointer;text-align:left;' + (i === 0 ? '' : 'border-top:1px solid #F4F6F9;'),
        go: () => this.openNotifItem(n.id, n.route),
      };
    });

    return {
      items,
      crumbs,
      navigate,
      goProfile: () => this.setState({ active: 'profile', profileOpen: false }),
      goTransparency: () => this.setState({ active: 'transparency', profileOpen: false }),
      goNotifications: () => this.setState({ active: 'notifications', notifOpen: false }),
      isFirstDayProp: isFirstDay,
      cartCount: this.cartList().length,
      cart: this.cartList(),
      addToCart: (item) => this.addToCart(item),
      removeFromCart: (uid) => this.removeFromCart(uid),
      tieneSI: this.props.tieneSupportInside !== false,
      isOverview: active === 'dashboard',
      isServices: active === 'services',
      isServiceDetail: active === 'service-detail',
      isDns: active === 'dns',
      isDomainDetail: active === 'domain-detail',
      isDomainTransfer: active === 'domain-transfer',
      isStore: active === 'store',
      isDomainSearch: active === 'domain-search',
      isStoreProduct: active === 'store-product',
      isCart: active === 'cart',
      isCheckout: active === 'checkout',
      isConfirm: active === 'confirm',
      isBilling: active === 'billing',
      isInvoiceDetail: active === 'invoice-detail',
      isSupport: active === 'support',
      isSupportInside: active === 'supportInside',
      isProfile: active === 'profile',
      isTransparency: active === 'transparency',
      isNotifications: active === 'notifications',
      billingScenario: this.props.estadoCobro ?? 'Factura pendiente',
      isOtherPage: active !== 'dashboard' && active !== 'services' && active !== 'service-detail' && active !== 'domain-detail' && active !== 'store' && active !== 'store-product' && active !== 'domain-search' && active !== 'cart' && active !== 'checkout' && active !== 'confirm' && active !== 'billing' && active !== 'invoice-detail' && active !== 'dns' && active !== 'domain-transfer' && active !== 'support' && active !== 'supportInside' && active !== 'profile' && active !== 'transparency' && active !== 'notifications',
      routeLabel,
      expanded,
      showSupportCard: showSupportCard && expanded,
      showSupportMini: showSupportCard && collapsed,
      sidebarStyleStr: 'position:fixed;top:0;left:0;height:100vh;width:' + sidebarWidth + ';z-index:40;display:flex;flex-direction:column;background:#F8FAFF;border-right:1px solid #E2E8F0;transition:width .2s ease;',
      topbarStyleStr: 'position:fixed;top:0;left:' + sidebarWidth + ';width:calc(100% - ' + sidebarWidth + ');height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#FFFFFF;border-bottom:1px solid #E2E8F0;z-index:30;transition:left .2s ease,width .2s ease;box-sizing:border-box;',
      mainStyleStr: 'margin-left:' + sidebarWidth + ';padding-top:64px;transition:margin-left .2s ease;min-height:100vh;',
      chevronStyle: 'transition:transform .2s ease;' + (collapsed ? 'transform:rotate(180deg);' : ''),
      collapseTitle: collapsed ? 'Expandir menú' : 'Contraer menú',
      profileOpen: this.state.profileOpen,
      notifOpen: this.state.notifOpen,
      notifRows, notifUnread, notifHasUnread: notifUnread > 0,
      markNotifAll: () => this.markNotifAll(),
      anyOpen: this.state.profileOpen || this.state.notifOpen,
      toggleCollapse: () => this.setState((s) => ({ collapsed: !s.collapsed })),
      toggleProfile: () => this.setState((s) => ({ profileOpen: !s.profileOpen, notifOpen: false })),
      toggleNotif: () => this.setState((s) => ({ notifOpen: !s.notifOpen, profileOpen: false })),
      closeAll: () => this.setState({ profileOpen: false, notifOpen: false }),
      openChat,
      convRows, convData, openConvCount, hasOpenConv: openConvCount > 0,
      chatOpen: this.state.chatOpen,
      chatChannel: this.state.chatChannel,
      chatSessionId: this.state.chatSessionId,
      closeChat: () => this.setState({ chatOpen: false, chatSessionId: null }),
      noop: () => {},
    };
  }
}
</script>
</body>
</html>
